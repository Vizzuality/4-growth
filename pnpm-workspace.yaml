packages:
  - "api/**"
  - "client/**"
  - "shared/**"
  - "e2e/**"

onlyBuiltDependencies:
  - "@nestjs/core"

overrides:
  # d3-color: security fix — forces 3.1.0 across all d3 consumers
  d3-color: 3.1.0
  # qs: blanket override needed — express 4.21.2 (via nestjs-base-service) declares exact qs 6.13.0
  qs: 6.15.0
  # nestjs-base-service ships outdated transitive deps; scope overrides to that parent
  "nestjs-base-service>express": "4.21.2"
  "express>path-to-regexp": "0.1.13"
  "nestjs-base-service>class-validator": "0.14.4"
  "nestjs-base-service>lodash": "4.18.1"
  "recharts>lodash": "4.18.1"
  # @aws-sdk/xml-builder ships vulnerable fast-xml-parser (GHSA-8gc5-j5rx-235r)
  # next-auth declares nodemailer ^7.0.7 as optional peer, but patches require >=8.0.4
  "next-auth>nodemailer": "8.0.5"
  "@aws-sdk/xml-builder>fast-xml-parser": "5.5.8"
  # @nestjs/core and @nestjs/platform-express ship path-to-regexp 8.3.0 (GHSA-j3q9-mxjg-w52f)
  "@nestjs/core>path-to-regexp": "8.4.0"
  "@nestjs/platform-express>path-to-regexp": "8.4.0"
  # Dev-only transitive overrides — parents don't ship patched versions yet
  "flat-cache>flatted": "3.4.2"
  "minimatch>brace-expansion": "2.0.3"
  "postcss-load-config>yaml": "2.8.3"
  "http-proxy-agent>@tootallnate/once": "3.0.1"
  "micromatch>picomatch": "2.3.2"
  "anymatch>picomatch": "2.3.2"
  "readdirp>picomatch": "2.3.2"

catalog:
  # Core
  zod: 3.25.76
  "@types/node": 25.3.0
  typescript: 5.9.3
  typeorm: 0.3.28
  bcrypt: 6.0.0
  "@types/bcrypt": 6.0.0
  # Linting & formatting
  eslint: 10.2.0
  eslint-config-prettier: 10.1.8
  eslint-plugin-prettier: 5.5.5
  prettier: 3.8.1
  "@typescript-eslint/eslint-plugin": 8.56.1
  "@typescript-eslint/parser": 8.56.1
  # Testing
  "@types/jest": 30.0.0
  # Tooling
  ts-node: 10.9.2
  # Shared libraries
  "@types/lodash": 4.17.24
  lodash: 4.18.1
  qs: 6.15.0
  "@types/qs": 6.14.0
  class-transformer: 0.5.1
  class-validator: 0.14.4
